<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支付宝</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1677ff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    max-width: 380px;
    width: 100%;
  }
  .qr-img {
    width: 280px;
    height: auto;
    border-radius: 12px;
  }
  .name {
    margin-top: 20px;
    font-size: 16px;
    color: #555;
  }
  .price {
    margin-top: 8px;
    font-size: 24px;
    color: #1677ff;
    font-weight: 700;
  }
  .desc {
    margin-top: 8px;
    font-size: 14px;
    color: #999;
  }
</style>
</head>
<body>
  <div class="card">
    <img src="alipay-1999.jpg" alt="支付宝" class="qr-img">
    <p class="name">*锦</p>
    <p class="price">¥9600.00</p>
    <p class="desc">AI财富管理与投资应用线下班</p>
  </div>
</body>
</html>
